# Auto-merge factory PRs from cloud routines.
# Cloud routines ("Claude Code on the web") open PRs but can't self-merge — git push is
# restricted to the working `claude/*` branch. This enables GitHub-native squash auto-merge
# for those PRs: GitHub merges once your required check passes. Branch protection is the gate;
# this never bypasses it. Scoped to `claude/*` so human + local-loop PRs are untouched.
#
# Setup: enable "Allow auto-merge" in repo Settings → General, and require your CI check on
# the protected branch. The installer drops this in as `auto-agent-auto-merge.yml`.

name: Auto-merge factory PRs
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
permissions:
  contents: write
  pull-requests: write
jobs:
  enable-auto-merge:
    if: startsWith(github.head_ref, 'claude/') && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Enable squash auto-merge (GitHub merges once CI is green)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --squash --auto
